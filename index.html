    <title>سينما كاشف الأفلام | تجربة ذكاء اصطناعي فاخرة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400;1,700&family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #030303;
            color: #ffffff;
            margin: 0;
            overflow-x: hidden;
        }
        .decorative-text {
            font-family: 'Amiri', serif;
        }
        .cinema-gradient {
            background: radial-gradient(circle at 50% 30%, #150505 0%, #000000 100%);
        }
        .curtain-shadow {
            box-shadow: 0 0 100px rgba(0,0,0,0.95) inset;
        }
        @keyframes spotlight {
            0%, 100% { transform: translateX(-20%) rotate(-8deg); opacity: 0.2; }
            50% { transform: translateX(20%) rotate(8deg); opacity: 0.4; }
        }
        .spotlight {
            background: radial-gradient(ellipse at top, rgba(220,38,38,0.3) 0%, transparent 70%);
            animation: spotlight 12s infinite ease-in-out;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.2);
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #4a0000;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #7f0000;
        }
        ::selection {
            background: #e11d48;
            color: white;
        }
    </style>
